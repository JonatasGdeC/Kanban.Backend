name: Deploy API to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            docker stop kanban-api || true
            docker rm kanban-api || true

            docker system prune -a -f || true
            docker volume prune -f || true
            docker builder prune -a -f || true

            rm -f "$HOME/kanban-backend/.git/index.lock" || true

            if [ ! -d "$HOME/kanban-backend/.git" ]; then
              rm -rf "$HOME/kanban-backend"
              git clone https://github.com/JonatasGdeC/Kanban.Backend.git "$HOME/kanban-backend"
            fi

            cd "$HOME/kanban-backend"

            git checkout master
            git pull origin master

            docker build -t kanban-api .

            cat > .env << 'EOF'
            ASPNETCORE_ENVIRONMENT=Production
            ConnectionStrings__connection=${{ secrets.DB_CONNECTION_STRING }}
            Settings__Jwt__SigningKey=${{ secrets.JWT_SIGNING_KEY }}
            Settings__Jwt__ExpiresMinutes=30
            Settings__PasswordResetToken__ExpiresMinutes=15
            EmailSettings__Host=smtp.gmail.com
            EmailSettings__Port=465
            EmailSettings__Username=${{ secrets.EMAIL_USERNAME }}
            EmailSettings__Password=${{ secrets.EMAIL_PASSWORD }}
            EmailSettings__From=${{ secrets.EMAIL_FROM }}
            EOF

            docker run -d \
              --name kanban-api \
              -p 8080:8080 \
              --restart unless-stopped \
              --env-file .env \
              kanban-api

            docker image prune -f
            docker container prune -f