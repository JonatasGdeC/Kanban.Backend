name: Deploy API to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "$HOME/kanban-backend/.git" ]; then
              git clone https://github.com/JonatasGdeC/Kanban.Backend.git "$HOME/kanban-backend"
            fi

            cd "$HOME/kanban-backend"

            git checkout master
            git pull origin master

            docker stop kanban-api || true
            docker rm kanban-api || true

            docker build -t kanban-api .

            docker run -d \
              --name kanban-api \
              -p 8080:8080 \
              --restart unless-stopped \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ConnectionStrings__DefaultConnection='${{ secrets.DB_CONNECTION_STRING }}' \
              kanban-api